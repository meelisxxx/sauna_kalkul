name: Fetch Elering prices

on:
  schedule:
    - cron: '5 * * * *'   # iga tund :05 UTC (Elering avaldab homse hinnad ~13:00 UTC)
  workflow_dispatch: {}    # manuaalne trigger

concurrency:
  group: fetch-elering
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tõmba ja agreegeeri
        run: node scripts/fetch-prices.mjs

      - name: Commit kui muutus
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add prices.json
          if git diff --cached --quiet; then
            echo "Hindades muutust pole — skip commit"
          else
            git commit -m "chore: update Elering prices ($(date -u +%FT%H:%MZ))"
            git push
          fi
