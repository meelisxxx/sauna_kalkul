<!DOCTYPE html>
<html lang="et">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E7WNGX4Q6W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E7WNGX4Q6W');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaunaMaster Pro ⚡</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #f59e0b;
            --success-color: #10b981;
            --input-bg: #334155;
            --secondary-text: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: var(--card-color); padding: 2.5rem; border-radius: 24px; max-width: 450px; width: 100%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        h1 { color: var(--accent-color); text-align: center; font-size: 2rem; }
        .tabs { display: flex; background: var(--input-bg); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 9px; cursor: pointer; font-weight: bold; color: var(--secondary-text); }
        .tab.active { background: var(--accent-color); color: #0f172a; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box; }
        .btn-calc { background: var(--accent-color); color: #0f172a; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; margin-bottom: 10px; font-size: 1.1rem; }
        .btn-best { background: transparent; color: var(--success-color); border: 2px solid var(--success-color); padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: var(--secondary-text); border-top: 1px solid #475569; padding-top: 20px; line-height: 1.6; }
        #loading { text-align: center; color: var(--accent-color); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>SaunaMaster Pro ⚡</h1>
    <div class="tabs">
        <div class="tab active" id="tabExchange" onclick="setMode('exchange')">Börsipakett</div>
        <div class="tab" id="tabFixed" onclick="setMode('fixed')">Fikseeritud</div>
    </div>
    <div id="loading">Andmete laadimine...</div>
    <div class="input-group">
        <label>Kui kaua saunas möllad?</label>
        <select id="duration">
            <option value="1">1 tund</option>
            <option value="2">2 tundi</option>
            <option value="3" selected>3 tundi</option>
            <option value="4">4 tundi</option>
        </select>
    </div>
    <div class="input-group" id="startTimeGroup">
        <label>Millal alustad kütmist?</label>
        <select id="startTimeSelect">
            <option>Viga andmete laadimisel :(</option>
        </select>
    </div>
    <div id="fixedGroup" style="display:none;">
        <div class="input-group">
            <label>Sinu fikseeritud hind (senti/kWh)</label>
            <input type="number" id="fixedPrice" value="15">
        </div>
    </div>
    <button class="btn-calc" onclick="calculate()">🔥 Arvuta kulu</button>
    <button class="btn-best" onclick="findBest()">🌱 Leia soodsaim aeg</button>
    <div id="resultArea" style="margin-top:20px; text-align:center; font-weight:bold; color:var(--success-color); font-size:1.2rem;"></div>
    <div class="footer">
        LessGo OÜ | Reg: 16914274<br>
        Langerma küla, Põhja-Pärnumaa vald<br>
        Kontakt: meelis@lessgo.ee<br>
        <a href="#" style="color:var(--secondary-text)">Privaatsus ja tingimused</a>
    </div>
</div>
<script>
    let electricityPrices = [];
    let currentMode = 'exchange';
    const fetchWithTimeout = async (resource, options = {}) => {
        const { timeout = 5000 } = options;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(resource, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
    };
    async function fetchPrices() {
        document.getElementById('loading').style.display = 'block';
        const start = new Date().toISOString();
        const end = new Date(new Date().getTime() + 86400000).toISOString();
        const eleringUrl = `https://dashboard.elering.ee/api/nps/price?start=${start}&end=${end}`;
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(eleringUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(eleringUrl)}`
        ];
        for (let url of proxies) {
            try {
                const res = await fetchWithTimeout(url);
                const data = await res.json();
                const actualData = data.contents ? JSON.parse(data.contents) : data;
                if (actualData && actualData.data && actualData.data.ee) {
                    electricityPrices = actualData.data.ee;
                    populateTimeSelect();
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
            } catch (e) { console.error("Proxy viga:", e); }
        }
        document.getElementById('startTimeSelect').innerHTML = '<option>Viga andmete laadimisel :(</option>';
        document.getElementById('loading').style.display = 'none';
    }
    function populateTimeSelect() {
        const select = document.getElementById('startTimeSelect');
        select.innerHTML = '';
        const now = new Date();
        electricityPrices.forEach(p => {
            const time = new Date(p.timestamp * 1000);
            if (time >= now) {
                const opt = document.createElement('option');
                opt.value = p.timestamp;
                opt.text = `${time.getHours()}:00 (${(p.price/10).toFixed(1)} s/kWh)`;
                select.appendChild(opt);
            }
        });
    }
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tabExchange').className = mode === 'exchange' ? 'tab active' : 'tab';
        document.getElementById('tabFixed').className = mode === 'fixed' ? 'tab active' : 'tab';
        document.getElementById('startTimeGroup').style.display = mode === 'exchange' ? 'block' : 'none';
        document.getElementById('fixedGroup').style.display = mode === 'fixed' ? 'block' : 'none';
    }
    function calculate() {
        const power = 9; // Sinu kerise võimsus
        const duration = parseFloat(document.getElementById('duration').value);
        let cost = 0;
        if (currentMode === 'exchange') {
            const startTime = parseInt(document.getElementById('startTimeSelect').value);
            const startIndex = electricityPrices.findIndex(p => p.timestamp === startTime);
            for (let i = 0; i < duration; i++) {
                if (electricityPrices[startIndex + i]) {
                    cost += (electricityPrices[startIndex + i].price / 1000) * power;
                }
            }
        } else {
            const fixedPrice = parseFloat(document.getElementById('fixedPrice').value) / 100;
            cost = power * duration * fixedPrice;
        }
        document.getElementById('resultArea').innerText = `Kütmise kulu: ${cost.toFixed(2)} €`;
    }
    function findBest() {
        if (electricityPrices.length === 0) return;
        const power = 9;
        const duration = parseFloat(document.getElementById('duration').value);
        let minCost = Infinity;
        let bestTime = '';
        for (let i = 0; i <= electricityPrices.length - duration; i++) {
            let currentCost = 0;
            for (let j = 0; j < duration; j++) {
                currentCost += (electricityPrices[i + j].price / 1000) * power;
            }
            if (currentCost < minCost) {
                minCost = currentCost;
                bestTime = new Date(electricityPrices[i].timestamp * 1000).getHours() + ':00';
            }
        }
        document.getElementById('resultArea').innerText = `Soodsaim aeg alustamiseks: kell ${bestTime} (Kulu: ${minCost.toFixed(2)} €)`;
    }
    fetchPrices();
</script>
</body>
</html>
