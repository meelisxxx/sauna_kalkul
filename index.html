    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaunaMaster Pro - Leia soodsaim saunaaeg ⚡</title>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #f59e0b;
            --success-color: #10b981;
            --input-bg: #334155;
            --secondary-text: #94a3b8;
            --bmc-yellow: #FFDD00;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-color);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
        }

        h1 { color: var(--accent-color); text-align: center; margin-bottom: 20px; }

        .type-selector {
            display: flex;
            background: var(--input-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .type-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--secondary-text);
            transition: all 0.2s;
        }

        .type-option.active {
            background-color: var(--accent-color);
            color: #0f172a;
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #cbd5e1; }
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569;
            background-color: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box;
        }

        .btn-calc {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background-color: var(--accent-color); color: #0f172a;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        #tulemus {
            margin-top: 20px; padding: 15px; border-radius: 12px;
            background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent-color);
            display: none; line-height: 1.5;
        }

        .bmc-button {
            display: flex; align-items: center; justify-content: center;
            margin-top: 20px; padding: 10px; background-color: var(--bmc-yellow);
            color: #000; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SaunaMaster Pro ⚡</h1>
    
    <div class="type-selector" id="keris-type">
        <div class="type-option active" onclick="setType('elekter', this)">Elektrikeris</div>
        <div class="type-option" onclick="setType('puit', this)">Puidukeris</div>
    </div>

    <div id="elekter-inputs">
        <div class="input-group">
            <label>Kerise võimsus (kW)</label>
            <input type="number" id="power" value="9" step="0.5">
        </div>
        <div class="input-group">
            <label>Saunaskäigu kestus kokku (tundi)</label>
            <input type="number" id="duration" value="2" step="0.5">
        </div>
        <button class="btn-calc" onclick="findBestTime()">Leia soodsaim aeg</button>
    </div>

    <div id="puit-inputs" style="display:none; text-align: center; padding: 20px;">
        <p>Puidukerise puhul on kulu püsiv. <br> Naudi praksumist! 🔥</p>
    </div>

    <div id="tulemus"></div>

    <a href="https://www.buymeacoffee.com/meelis" class="bmc-button" target="_blank">
        ☕ Toeta sauna-äppi
    </a>
</div>

<script>
    let currentType = 'elekter';

    function setType(type, el) {
        currentType = type;
        document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('elekter-inputs').style.display = type === 'elekter' ? 'block' : 'none';
        document.getElementById('puit-inputs').style.display = type === 'puit' ? 'block' : 'none';
        document.getElementById('tulemus').style.display = 'none';
    }
